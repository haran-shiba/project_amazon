<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">

    <title>Document</title>
</head>
<body>
    <!--ヘッダー-->
    <div class="header">
    <div class="amazon-logo">
    <img src="images/Amazon_logo.svg" alt="Amazon Logo"> 
    <p>.co.jp</p>
    </div>

    <div class="header-address">
    <span class="nav-line-1">お届け先: 荏原 142-0061</span>
    <i class="fa-light fa-location-dot header-address-icon"></i>
    <span class="nav-line-2">場所を更新する</span>
    </div>

    <!--検索フォーム-->
    <form class="search-form" action="404.html">

    <div class="category-select">
    <div class="category-label">すべて</div>

    <select class="category-search">
    <option value="all">すべてのカテゴリー</option>
    <option value="hurusato">Amazon ふるさと納税</option>
    <option value="sale">プライム感謝セール</option>
    <option value="audio">Audibleオーディオブック</option>
    <option value="flesh">Amazon フレッシュ</option>
    <option value="life">ライフ</option>
    <option value="seijyo">成城石井</option>
    <option value="device">Amazon デバイス</option>
    <option value="kindle">Kindleストア</option>
    <option value="video">Prime Video</option>
    <option value="alexa">Alexaスキル</option>
    <option value="teikibin">Amazon定期おトク便</option>
    <option value="digitalmusic">デジタルミュージック</option>
    <option value="appgame">アプリ&ゲーム</option>
    <option value="book">本</option>
    <option value="books">洋書</option>
    <option value="music">音楽</option>
    <option value="classic">クラシック</option>
    <option value="dvd">DVD</option>
    <option value="pc">コンピューター&テレビゲーム</option>
    </select>


    <!--:hover使用、言語変更-->
    <div class="header-language">
    <img src="国旗の画像を挿入する" alt="日本国旗">
    <span class="nav-line-2">JP</span>
    <i class="fa-solid fa-caret-down"></i>
    </div>

    <div class="language-popup">
    <p class="popup-title">言語を変更する</p>
    <ul class="language-popup-list">
    <li>日本語 - JA</li>
    <div class="language-popup-divider"></div>
    <li>English - EN</li>
    <li>中文 - ZH</li>
    </ul>
    <div class="language-popup-divider"></div>

    <div class="language-popup-money">
    <p class="popup-title">通貨を変更する</p>
    <p>¥ -JPY- 日本円</p>
    <a href="404.html">変更する</a>
    <div class="language-popup-divider"></div>
    </div>

    <div class="language-popup-country">
    <img src="日本の国旗画像挿入" alt="日本国旗">
    <p>お客様は今Amazon.co.jpでお買い物中です</p>
    <a href="404.html">国/地域を変更します</a>
    </div>
    </div>

    <!--:hover使用する-->
    <div class="header-login">
    <span class="nav-line-1">こんにちは,ログイン</span>
    <span class="nav-line-2">アカウント＆リスト</span>
    </div>

    <div class="login-popup">
    <p class="popup-title">言語を変更する</p>




    <div class="header-address">
    <span class="nav-line-1">返品もこちら</span>
    <span class="nav-line-2">注文履歴</span>
    </div>

    <div class="header-cart">
    <i ・・・カートのロゴ探す></i>
    <span class="nav-line-2">カート</span>
</div>

</div>






</body>
</html>
